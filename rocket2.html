<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Orbital Builder - Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030613; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; user-select: none; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #ui-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 15, 25, 0.9); border: 1px solid #334; border-radius: 12px;
            padding: 15px; display: flex; gap: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            pointer-events: auto; z-index: 10;
        }
        
        .part-btn {
            background: #1e293b; border: 2px solid #334; border-radius: 8px; padding: 10px 20px;
            color: white; font-weight: bold; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; font-size: 0.8rem;
        }
        .part-btn:hover { background: #334155; }
        .part-btn.active { border-color: #00ffcc; background: rgba(0, 255, 204, 0.1); color: #00ffcc; }
        
        #instructions {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7);
            padding: 15px; border-radius: 8px; border: 1px solid #445; pointer-events: none;
        }
        h2 { margin: 0 0 5px 0; color: #00ffcc; font-size: 1.2rem; letter-spacing: 1px; }
        p { margin: 0; color: #8892b0; font-size: 0.85rem; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="instructions">
        <h2>VAB 3D PROTOTYPE</h2>
        <p>1. Select a part below.</p>
        <p>2. Tap/Click to place on the pad or stack on parts.</p>
        <p>3. Drag background to rotate camera.</p>
    </div>

    <div id="ui-panel">
        <button class="part-btn" data-type="pod">Cmd Pod</button>
        <button class="part-btn active" data-type="tank">Fuel Tank</button>
        <button class="part-btn" data-type="engine">Engine</button>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030613, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 10, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Prevent camera going below ground

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfffaed, 2.0);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- 3. ENVIRONMENT & BUILD LOGIC ---
        const buildableObjects = []; // Array for Raycaster to check against

        // Launchpad
        const padGeo = new THREE.CylinderGeometry(8, 8, 1, 32);
        const padMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.8 });
        const pad = new THREE.Mesh(padGeo, padMat);
        pad.position.y = -0.5;
        pad.receiveShadow = true;
        pad.userData.isPad = true;
        scene.add(pad);
        buildableObjects.push(pad);

        // Grid Helper
        const grid = new THREE.GridHelper(20, 20, 0x445566, 0x223344);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- 4. PART DICTIONARY ---
        const parts = {
            'pod': { geo: new THREE.ConeGeometry(1, 1.5, 16), color: 0xe2e8f0, height: 1.5 },
            'tank': { geo: new THREE.CylinderGeometry(1.2, 1.2, 3, 16), color: 0xcbd5e1, height: 3 },
            'engine': { geo: new THREE.CylinderGeometry(0.8, 1.2, 1.5, 16), color: 0x475569, height: 1.5 }
        };

        let currentPartType = 'tank';

        // --- 5. GHOST MESH (Placement Indicator) ---
        const ghostMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffcc, transparent: true, opacity: 0.4, depthWrite: false 
        });
        let ghostMesh = new THREE.Mesh(parts[currentPartType].geo, ghostMat);
        scene.add(ghostMesh);

        // --- 6. RAYCASTING & INTERACTION ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let isDraggingCamera = false;

        // UI Event Listeners
        document.querySelectorAll('.part-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentPartType = e.target.dataset.type;
                
                // Update ghost geometry
                ghostMesh.geometry = parts[currentPartType].geo;
            });
        });

        // Track if orbit controls are moving to prevent accidental part placement
        controls.addEventListener('start', () => isDraggingCamera = false);
        controls.addEventListener('change', () => isDraggingCamera = true);

        // Update Ghost Position on Move
        window.addEventListener('pointermove', (event) => {
            // Convert pointer position to normalized device coordinates
            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(buildableObjects);

            if (intersects.length > 0) {
                ghostMesh.visible = true;
                const hit = intersects[0];
                const normal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize();
                const partHeight = parts[currentPartType].height;

                // Stacking logic
                if (hit.object.userData.isRocketPart) {
                    // Align X and Z to stack perfectly straight
                    ghostMesh.position.x = hit.object.position.x;
                    ghostMesh.position.z = hit.object.position.z;

                    const hitHeight = hit.object.userData.height;
                    
                    // Attach to top or bottom based on normal
                    if (normal.y > 0.5) {
                        ghostMesh.position.y = hit.object.position.y + (hitHeight / 2) + (partHeight / 2);
                    } else if (normal.y < -0.5) {
                        ghostMesh.position.y = hit.object.position.y - (hitHeight / 2) - (partHeight / 2);
                    } else {
                        ghostMesh.visible = false; // Disable side-attachment for now
                    }
                } else if (hit.object.userData.isPad) {
                    // Building on the ground
                    ghostMesh.position.copy(hit.point);
                    ghostMesh.position.y = partHeight / 2;
                }
            } else {
                ghostMesh.visible = false;
            }
        });

        // Place Part on Up/Click
        window.addEventListener('pointerup', (event) => {
            // Ignore if we were rotating the camera or clicked UI
            if (isDraggingCamera || event.target.tagName === 'BUTTON') return;

            if (ghostMesh.visible) {
                const partData = parts[currentPartType];
                const newMat = new THREE.MeshStandardMaterial({ 
                    color: partData.color, 
                    roughness: 0.5, 
                    metalness: 0.2 
                });
                
                const newPart = new THREE.Mesh(partData.geo, newMat);
                newPart.position.copy(ghostMesh.position);
                newPart.castShadow = true;
                newPart.receiveShadow = true;
                
                // Tag it so the raycaster knows how to interact with it
                newPart.userData = { 
                    isRocketPart: true, 
                    type: currentPartType, 
                    height: partData.height 
                };
                
                scene.add(newPart);
                buildableObjects.push(newPart);
                
                // Add a little pop animation effect
                newPart.scale.set(0.1, 0.1, 0.1);
                let scale = 0.1;
                const animatePop = () => {
                    scale += (1.0 - scale) * 0.2;
                    newPart.scale.set(scale, scale, scale);
                    if (scale < 0.99) requestAnimationFrame(animatePop);
                    else newPart.scale.set(1, 1, 1);
                };
                animatePop();
            }
        });

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
