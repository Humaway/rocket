<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini Space Program - Flight Test</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sunny sky blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevent scrolling on touch */
        }

        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Bubbly UI Styling */
        .bubbly-ui {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 16px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border: 4px solid #fff;
            color: #333;
            font-weight: bold;
        }

        #telemetry {
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            font-size: 1.2rem;
        }

        .metric-value {
            color: #FF7F50; /* Cheerful orange */
            font-family: monospace;
            font-size: 1.4rem;
        }

        #controls-hint {
            top: 30px;
            right: 30px;
            font-size: 0.9rem;
            color: #555;
        }

        kbd {
            background: #eee;
            border-radius: 8px;
            padding: 4px 8px;
            box-shadow: 0 4px 0 #ccc;
            font-family: monospace;
        }

        /* Touch Controls for Tablet Testing */
        #touch-controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .touch-btn {
            background: #32CD32; /* Bright green */
            border: none;
            border-radius: 50px;
            padding: 20px 30px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 6px 0 #228B22;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .touch-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #228B22;
        }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="telemetry" class="bubbly-ui">
        <div class="metric"><span>ALTITUDE:</span> <span id="alt-val" class="metric-value">0 m</span></div>
        <div class="metric"><span>VELOCITY:</span> <span id="vel-val" class="metric-value">0 m/s</span></div>
        <div class="metric"><span>THROTTLE:</span> <span id="thr-val" class="metric-value">0%</span></div>
    </div>

    <div id="controls-hint" class="bubbly-ui">
        Shift / Ctrl : Throttle<br><br>
        W A S D : Pitch / Yaw<br><br>
        Q E : Roll
    </div>

    <div id="touch-controls">
        <button id="btn-throttle-up" class="touch-btn">THR +</button>
        <button id="btn-throttle-down" class="touch-btn" style="background:#FF7F50; box-shadow: 0 6px 0 #CD5C5C;">THR -</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as CANNON from 'cannon-es';

        // --- SCENE SETUP ---
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sunny sky
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.002);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 10, 20);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        scene.add(dirLight);

        // --- PHYSICS WORLD ---
        const world = new CANNON.World({
            gravity: new CANNON.Vec3(0, -9.81, 0), // Standard Earth gravity
        });
        
        // Physics material for landing
        const groundMat = new CANNON.Material();
        const rocketMat = new CANNON.Material();
        const contactMat = new CANNON.ContactMaterial(groundMat, rocketMat, { friction: 0.5, restitution: 0.1 });
        world.addContactMaterial(contactMat);

        // --- ENVIRONMENT (Vibrant landmass & ocean) ---
        // Ground
        const groundGeo = new THREE.CylinderGeometry(500, 500, 2, 64);
        const groundMesh = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ color: 0x32CD32, roughness: 0.8 }));
        groundMesh.position.y = -1;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        const groundBody = new CANNON.Body({
            type: CANNON.Body.STATIC,
            shape: new CANNON.Cylinder(500, 500, 2, 64),
            material: groundMat
        });
        groundBody.position.set(0, -1, 0);
        // Cannon's cylinder requires a rotation adjustment
        const q = new CANNON.Quaternion();
        q.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
        groundBody.quaternion.copy(q);
        world.addBody(groundBody);

        // Launchpad
        const padMesh = new THREE.Mesh(new THREE.BoxGeometry(10, 1, 10), new THREE.MeshStandardMaterial({ color: 0x888888 }));
        padMesh.position.y = 0.5;
        padMesh.receiveShadow = true;
        scene.add(padMesh);
        
        const padBody = new CANNON.Body({
            type: CANNON.Body.STATIC,
            shape: new CANNON.Box(new CANNON.Vec3(5, 0.5, 5)),
            position: new CANNON.Vec3(0, 0.5, 0),
            material: groundMat
        });
        world.addBody(padBody);

        // --- THE ROCKET ---
        const rocketRadius = 1;
        const rocketHeight = 6;
        const rocketMass = 5000; // kg

        // Visual
        const rocketGroup = new THREE.Group();
        const hullGeo = new THREE.CylinderGeometry(rocketRadius, rocketRadius, rocketHeight, 16);
        const hullMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
        const hull = new THREE.Mesh(hullGeo, hullMat);
        hull.castShadow = true;
        
        const noseGeo = new THREE.ConeGeometry(rocketRadius, 2, 16);
        const noseMat = new THREE.MeshStandardMaterial({ color: 0xFF4500 }); // Orange nose
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.position.y = rocketHeight / 2 + 1;
        
        rocketGroup.add(hull);
        rocketGroup.add(nose);
        scene.add(rocketGroup);

        // Engine Exhaust Visual (Simple cone for now)
        const exhaustGeo = new THREE.ConeGeometry(0.8, 3, 16);
        const exhaustMat = new THREE.MeshBasicMaterial({ color: 0xFF8C00, transparent: true, opacity: 0.8 });
        const exhaust = new THREE.Mesh(exhaustGeo, exhaustMat);
        exhaust.position.y = -(rocketHeight / 2) - 1.5;
        exhaust.rotation.x = Math.PI;
        exhaust.visible = false; // Hide until throttle
        rocketGroup.add(exhaust);

        // Physics
        const rocketBody = new CANNON.Body({
            mass: rocketMass,
            shape: new CANNON.Cylinder(rocketRadius, rocketRadius, rocketHeight, 16),
            position: new CANNON.Vec3(0, 1 + rocketHeight / 2, 0),
            material: rocketMat,
            linearDamping: 0.05, // Slight atmospheric drag
            angularDamping: 0.5
        });
        world.addBody(rocketBody);

        // --- FLIGHT SYSTEMS & INPUTS ---
        let throttle = 0;
        const maxThrust = 120000; // Newtons
        const inputs = { w: false, a: false, s: false, d: false, q: false, e: false, shift: false, ctrl: false };

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (inputs.hasOwnProperty(key)) inputs[key] = true;
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (inputs.hasOwnProperty(key)) inputs[key] = false;
        });

        // Touch Hooks
        const btnUp = document.getElementById('btn-throttle-up');
        const btnDown = document.getElementById('btn-throttle-down');
        
        btnUp.addEventListener('touchstart', (e) => { e.preventDefault(); inputs.shift = true; });
        btnUp.addEventListener('touchend', (e) => { e.preventDefault(); inputs.shift = false; });
        btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); inputs.ctrl = true; });
        btnDown.addEventListener('touchend', (e) => { e.preventDefault(); inputs.ctrl = false; });

        // UI Elements
        const uiAlt = document.getElementById('alt-val');
        const uiVel = document.getElementById('vel-val');
        const uiThr = document.getElementById('thr-val');

        // --- MAIN LOOP ---
        const timeStep = 1 / 60;
        let lastCallTime;

        function animate(time) {
            requestAnimationFrame(animate);

            // Time stepping for physics
            const timeSeconds = time / 1000;
            if (!lastCallTime) {
                world.step(timeStep);
            } else {
                const dt = timeSeconds - lastCallTime;
                world.step(timeStep, dt, 3);
            }
            lastCallTime = timeSeconds;

            // Handle Flight Controls
            if (inputs.shift) throttle = Math.min(throttle + 1, 100);
            if (inputs.ctrl) throttle = Math.max(throttle - 1, 0);

            // Apply Thrust (Local Y axis of the rocket)
            const thrustScalar = (throttle / 100) * maxThrust;
            if (thrustScalar > 0) {
                // Get the local "up" vector of the rocket
                const localUp = new CANNON.Vec3(0, 1, 0);
                const worldUp = rocketBody.quaternion.vmult(localUp);
                const thrustVector = worldUp.scale(thrustScalar);
                
                // Apply force at the center of mass
                rocketBody.applyForce(thrustVector, rocketBody.position);
                
                // Animate Exhaust
                exhaust.visible = true;
                exhaust.scale.setScalar(0.5 + (throttle / 100) * 0.5);
                exhaustMat.opacity = 0.5 + Math.random() * 0.5; // Flicker
            } else {
                exhaust.visible = false;
            }

            // Apply Torques (Steering)
            const torqueAmt = 15000;
            const localTorque = new CANNON.Vec3(0, 0, 0);
            if (inputs.w) localTorque.x -= torqueAmt; // Pitch down
            if (inputs.s) localTorque.x += torqueAmt; // Pitch up
            if (inputs.a) localTorque.z += torqueAmt; // Yaw left
            if (inputs.d) localTorque.z -= torqueAmt; // Yaw right
            if (inputs.q) localTorque.y += torqueAmt; // Roll left
            if (inputs.e) localTorque.y -= torqueAmt; // Roll right

            if (localTorque.lengthSquared() > 0) {
                const worldTorque = rocketBody.quaternion.vmult(localTorque);
                rocketBody.torque.vadd(worldTorque, rocketBody.torque);
            }

            // Sync Visuals with Physics
            rocketGroup.position.copy(rocketBody.position);
            rocketGroup.quaternion.copy(rocketBody.quaternion);

            // Camera Tracking (Lock onto rocket)
            controls.target.copy(rocketGroup.position);
            controls.update();

            // Update UI Telemetry
            const altitude = Math.max(0, rocketBody.position.y - (1 + rocketHeight / 2));
            const velocity = rocketBody.velocity.length();
            
            uiAlt.innerText = altitude.toFixed(0) + ' m';
            uiVel.innerText = velocity.toFixed(1) + ' m/s';
            uiThr.innerText = throttle.toFixed(0) + '%';

            renderer.render(scene, camera);
        }

        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
