<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Rocket Simulator - High Fidelity Trajectory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #02040a; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; }
        .panel { position: absolute; background: rgba(10, 15, 25, 0.9); border: 1px solid #334; border-radius: 8px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 10; }
        
        #build-ui { top: 20px; left: 20px; width: 350px; display: flex; flex-direction: column; gap: 10px; }
        #flight-ui { top: 20px; right: 20px; width: 250px; display: none; flex-direction: column; gap: 15px; }
        
        h2, h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: #4da8da; letter-spacing: 1px; }
        
        .btn { background: #1e293b; color: white; border: 1px solid #4da8da; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #4da8da; color: #000; }
        .btn-launch { background: #28a745; border-color: #28a745; margin-top: 10px; }
        .btn-launch:hover { background: #218838; color: white; }
        .btn-map { background: #eab308; border-color: #ca8a04; color: black; }

        .build-container { display: flex; gap: 15px; }
        .controls-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .visualizer-col { width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-height: 250px; background: rgba(0,0,0,0.5); border: 1px dashed #556; padding: 5px; }
        
        #stage-list { background: rgba(0,0,0,0.5); border-radius: 4px; padding: 10px; max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .stage-item { background: #0f172a; padding: 5px; border-radius: 3px; font-size: 0.85rem; }
        .stage-active { border-left: 3px solid #28a745; background: #1e293b; }

        .telemetry-row { display: flex; justify-content: space-between; border-bottom: 1px solid #334; padding-bottom: 5px; font-family: monospace; font-size: 1.1rem; }
        .telemetry-label { color: #8892b0; font-size: 0.9rem;}

        #controls-help { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; display: none; color: #ccc; z-index: 10; border: 1px solid #4da8da; }
        .bp-part { border: 1px solid rgba(255,255,255,0.2); width: 100%; text-align: center; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; }
        
        #clamp-warning { color: #eab308; font-weight: bold; font-size: 0.9rem; text-align: center; margin-top: 10px; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="build-ui" class="panel">
        <h2>VAB (Assembly)</h2>
        <div class="build-container">
            <div class="controls-col">
                <button class="btn" onclick="addPart('parachute')">+ Parachute</button>
                <button class="btn" onclick="addPart('tank')">+ Fuel Tank</button>
                <button class="btn" onclick="addPart('decoupler')">+ Decoupler</button>
                <button class="btn" style="border-color: #4444ff;" onclick="addPart('vacuum')">+ Vacuum Engine</button>
                <button class="btn" style="border-color: #ffaa00;" onclick="addPart('booster')">+ Standard Booster</button>
                <button class="btn" style="border-color: #ff2222; background: #3a1515;" onclick="addPart('heavy')">+ Heavy Lift Engine</button>
                <button class="btn" onclick="resetBuild()" style="background: #4a1515; border-color: #ff4444; margin-top:5px;">Clear Rocket</button>
            </div>
            <div class="visualizer-col" id="blueprint-visualizer"></div>
        </div>
        <h3 style="margin-top: 15px;">Staging (Bottom Up)</h3>
        <div id="stage-list"></div>
        <button class="btn btn-launch" onclick="launch()">INITIATE LAUNCH</button>
    </div>

    <div id="flight-ui" class="panel">
        <h2>Telemetry</h2>
        <button class="btn btn-map" id="map-toggle" style="width: 100%; margin-bottom: 15px;" onclick="toggleMap()">[M] MAP VIEW: OFF</button>
        <div class="telemetry-row"><span class="telemetry-label">ALTITUDE</span><span id="tel-alt">0 km</span></div>
        <div class="telemetry-row"><span class="telemetry-label">SPEED</span><span id="tel-spd">0 m/s</span></div>
        <div class="telemetry-row"><span class="telemetry-label">ATMO DENSITY</span><span id="tel-atmo">100%</span></div>
        <div class="telemetry-row" style="margin-top: 10px;"><span class="telemetry-label">STAGE FUEL</span><span id="tel-fuel">100%</span></div>
        <div id="clamp-warning">SYSTEMS READY<br><span style="font-size:0.75rem; color:#aaa;">Ignite with [W] or [SPACE]</span></div>
    </div>

    <div id="controls-help">[W/UP] Thrust | [A/D] Steer | [SPACE] Stage | [M] Map View</div>

    <script>
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
              Bodies = Matter.Bodies, Body = Matter.Body, Composite = Matter.Composite,
              Vector = Matter.Vector, Events = Matter.Events;

        let engine, render, runner;
        let mode = 'build';
        let keys = {};
        
        const podPart = { type: 'pod', name: 'Cmd Pod', mass: 0.5, height: 40, width: 30, color: '#dddddd' };
        let rocketParts = [podPart];
        
        let activeShip; 
        let debrisBodies = []; 
        
        let activeEngineLocalIndex = -1;
        let currentStageIndex = 0;
        let isLaunched = false;
        
        const PLANET_RADIUS = 500000; 
        const PLANET_POS = { x: 0, y: 0 }; 
        const GRAVITY_CONSTANT = 250000000; 
        const ATMOSPHERE_HEIGHT = 50000; 
        
        let isMapView = false;
        let mapCameraViewSpan = PLANET_RADIUS * 1.3; 

        updateUI();

        function addPart(type) {
            let part;
            if (type === 'parachute') {
                if (rocketParts[0].type === 'parachute') return;
                rocketParts.unshift({ type: 'parachute', name: 'Parachute', mass: 0.1, height: 15, width: 20, color: '#ff4444' });
                updateUI(); return;
            } else if (type === 'tank') {
                part = { type: 'tank', name: 'Fuel Tank', mass: 0.6, fuelCapacity: 2000, fuelRemaining: 2000, height: 60, width: 40, color: '#ff8800' };
            } else if (type === 'decoupler') {
                part = { type: 'decoupler', name: 'Decoupler', mass: 0.1, height: 8, width: 42, color: '#888888' };
            } else if (type === 'vacuum') {
                part = { type: 'engine', name: 'Vac Engine', mass: 0.4, thrust: 0.0015, fuelDrain: 0.2, height: 25, width: 20, color: '#4444ff' }; 
            } else if (type === 'booster') {
                part = { type: 'engine', name: 'Booster', mass: 1.0, thrust: 0.0055, fuelDrain: 2.0, height: 45, width: 28, color: '#ffaa00' }; 
            } else if (type === 'heavy') {
                part = { type: 'engine', name: 'Heavy Lift', mass: 2.5, thrust: 0.012, fuelDrain: 6.0, height: 55, width: 36, color: '#ff2222' }; 
            }
            rocketParts.push(JSON.parse(JSON.stringify(part)));
            updateUI();
        }

        function resetBuild() { rocketParts = [JSON.parse(JSON.stringify(podPart))]; updateUI(); }

        function updateUI() {
            const vis = document.getElementById('blueprint-visualizer');
            vis.innerHTML = '';
            rocketParts.forEach(part => {
                let div = document.createElement('div');
                div.className = 'bp-part';
                div.style.height = part.height + 'px'; div.style.width = part.width + 'px'; div.style.backgroundColor = part.color;
                div.innerText = part.name.substring(0,3);
                vis.appendChild(div);
            });
            const list = document.getElementById('stage-list');
            list.innerHTML = '';
            let stages = rocketParts.slice().reverse(); 
            stages.forEach((part, idx) => {
                let realIndex = rocketParts.length - 1 - idx;
                let div = document.createElement('div'); div.className = `stage-item`; div.id = `stage-ui-${realIndex}`;
                div.innerHTML = `<span>[Stage ${idx + 1}] ${part.name}</span>`;
                list.appendChild(div);
            });
            currentStageIndex = rocketParts.length - 1;
            highlightCurrentStage();
        }

        function highlightCurrentStage() {
            document.querySelectorAll('.stage-item').forEach(el => el.classList.remove('stage-active'));
            if(document.getElementById(`stage-ui-${currentStageIndex}`)) document.getElementById(`stage-ui-${currentStageIndex}`).classList.add('stage-active');
        }

        function createShipCompound(partsData) {
            let bodies = [];
            let currentY = 0;
            let totalMass = 0;
            for (let i = 0; i < partsData.length; i++) {
                let p = partsData[i];
                let b = Bodies.rectangle(0, currentY + p.height / 2, p.width, p.height, { render: { fillStyle: p.color }});
                b.partData = p; bodies.push(b); currentY += p.height; totalMass += p.mass;
            }
            let compound = Body.create({ parts: bodies, mass: totalMass, frictionAir: 0.00 }); 
            compound.partsData = partsData; 
            return compound;
        }

        function launch() {
            mode = 'flight';
            document.getElementById('build-ui').style.display = 'none';
            document.getElementById('flight-ui').style.display = 'flex';
            document.getElementById('controls-help').style.display = 'block';
            document.getElementById('clamp-warning').style.display = 'block';
            isLaunched = false;
            isMapView = false;
            initPhysics();
        }

        function initPhysics() {
            engine = Engine.create({ positionIterations: 16, velocityIterations: 16 });
            engine.gravity.scale = 0; 
            render = Render.create({
                element: document.body, engine: engine,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#02040a' }
            });
            planetBody = Bodies.circle(PLANET_POS.x, PLANET_POS.y, PLANET_RADIUS, { 
                isStatic: true, friction: 1, render: { fillStyle: '#0d1a13', strokeStyle: '#1c402d', lineWidth: 10 } 
            });
            let launchpad = Bodies.rectangle(0, -PLANET_RADIUS - 10, 800, 20, {
                isStatic: true, friction: 1, render: { fillStyle: '#333b4d' }
            });
            Composite.add(engine.world, [planetBody, launchpad]);
            let liveParts = JSON.parse(JSON.stringify(rocketParts));
            activeShip = createShipCompound(liveParts);
            let startY = -PLANET_RADIUS - 20 - (activeShip.bounds.max.y - activeShip.bounds.min.y)/2;
            Body.setPosition(activeShip, {x: 0, y: startY});
            Body.setStatic(activeShip, true); 
            Composite.add(engine.world, activeShip);
            updateActiveEngine();
            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);
            Events.on(engine, 'beforeUpdate', gameLoop);
            Events.on(render, 'afterRender', customRender);
        }

        function updateActiveEngine() {
            activeEngineLocalIndex = -1;
            for (let i = activeShip.partsData.length - 1; i >= 0; i--) {
                if (activeShip.partsData[i].type === 'engine') { activeEngineLocalIndex = i; break; }
            }
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && mode === 'flight') stageRocket();
            if (e.code === 'KeyM' && mode === 'flight') toggleMap();
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        function toggleMap() {
            isMapView = !isMapView;
            let btn = document.getElementById('map-toggle');
            btn.innerText = isMapView ? "[M] MAP VIEW: ON" : "[M] MAP VIEW: OFF";
            btn.style.background = isMapView ? "#22c55e" : "#eab308";
        }

        function initiateLaunchSequence() {
            if (!isLaunched) {
                isLaunched = true;
                Body.setStatic(activeShip, false); 
                document.getElementById('clamp-warning').style.display = 'none';
            }
        }

        function stageRocket() {
            initiateLaunchSequence(); 
            if (currentStageIndex < 0) return;
            while (currentStageIndex >= 0) {
                let stagePartData = activeShip.partsData[currentStageIndex];
                let uiEl = document.getElementById(`stage-ui-${currentStageIndex}`);
                if(uiEl) uiEl.style.opacity = '0.3';
                if (stagePartData.type === 'parachute') {
                    Body.set(activeShip, 'frictionAir', 0.8); 
                    activeShip.parts[1].render.fillStyle = '#ffffff'; 
                    currentStageIndex--; break;
                } else if (stagePartData.type === 'decoupler') {
                    let splitIdx = currentStageIndex;
                    let topData = activeShip.partsData.slice(0, splitIdx);
                    let bottomData = activeShip.partsData.slice(splitIdx);
                    let oldAngle = activeShip.angle;
                    let oldVel = activeShip.velocity;
                    let oldAngVel = activeShip.angularVelocity;
                    let oldPodWorldPos = { x: activeShip.parts[1].position.x, y: activeShip.parts[1].position.y };
                    let oldDebrisWorldPos = { x: activeShip.parts[splitIdx + 1].position.x, y: activeShip.parts[splitIdx + 1].position.y };
                    Composite.remove(engine.world, activeShip);
                    activeShip = createShipCompound(topData);
                    let newPodLocalOffset = Vector.sub(activeShip.parts[1].position, activeShip.position);
                    let rotatedPodOffset = Vector.rotate(newPodLocalOffset, oldAngle);
                    Body.setPosition(activeShip, Vector.sub(oldPodWorldPos, rotatedPodOffset));
                    Body.setAngle(activeShip, oldAngle); Body.setVelocity(activeShip, oldVel); Body.setAngularVelocity(activeShip, oldAngVel);
                    Composite.add(engine.world, activeShip);
                    let debris = createShipCompound(bottomData);
                    let newDebrisLocalOffset = Vector.sub(debris.parts[1].position, debris.position);
                    let rotatedDebrisOffset = Vector.rotate(newDebrisLocalOffset, oldAngle);
                    Body.setPosition(debris, Vector.sub(oldDebrisWorldPos, rotatedDebrisOffset));
                    Body.setAngle(debris, oldAngle); Body.setVelocity(debris, oldVel); Body.setAngularVelocity(debris, oldAngVel);
                    Composite.add(engine.world, debris); debrisBodies.push(debris);
                    let sepForce = 0.005 * activeShip.mass;
                    Body.applyForce(activeShip, activeShip.position, {x: Math.sin(oldAngle)*sepForce, y: -Math.cos(oldAngle)*sepForce});
                    Body.applyForce(debris, debris.position, {x: -Math.sin(oldAngle)*sepForce, y: Math.cos(oldAngle)*sepForce});
                    currentStageIndex--; break; 
                } else { currentStageIndex--; }
            }
            updateActiveEngine(); highlightCurrentStage();
        }

        let isEngineBurning = false;

        function gameLoop() {
            if (mode !== 'flight' || !activeShip) return;
            let atmoPercentDisplay = 100;
            isEngineBurning = false;
            let allBodies = [activeShip, ...debrisBodies];
            allBodies.forEach(body => {
                if(!body) return;
                let dir = Vector.sub(PLANET_POS, body.position);
                let distSq = (dir.x * dir.x) + (dir.y * dir.y);
                let dist = Math.sqrt(distSq);
                if (isLaunched && dist > PLANET_RADIUS) {
                    let forceMag = (GRAVITY_CONSTANT * body.mass) / distSq;
                    let force = Vector.mult(Vector.normalise(dir), forceMag);
                    Body.applyForce(body, body.position, force);
                }
                let altitude = dist - PLANET_RADIUS;
                let atmoDensity = Math.max(0, 1 - (altitude / ATMOSPHERE_HEIGHT));
                if (body === activeShip) atmoPercentDisplay = Math.floor(atmoDensity * 100);
                if(body.partsData && body.partsData[0].type !== 'parachute') {
                    Body.set(body, 'frictionAir', 0.01 * atmoDensity);
                }
            });

            // Fuel & Thrust
            let stageStartIndex = 0, stageEndIndex = activeShip.partsData.length - 1;
            if (activeEngineLocalIndex !== -1) {
                for (let i = activeEngineLocalIndex; i >= 0; i--) { if (activeShip.partsData[i].type === 'decoupler') { stageStartIndex = i + 1; break; } }
            }

            if ((keys['KeyW'] || keys['ArrowUp']) && activeEngineLocalIndex !== -1) {
                initiateLaunchSequence();
                let engineData = activeShip.partsData[activeEngineLocalIndex];
                let fuelToDrain = engineData.fuelDrain || 1.0;
                let hasDrainedFuel = false;
                for(let i = stageEndIndex; i >= stageStartIndex; i--) {
                    let p = activeShip.partsData[i];
                    if(p.type === 'tank' && p.fuelRemaining > 0) {
                        if(p.fuelRemaining >= fuelToDrain) { p.fuelRemaining -= fuelToDrain; fuelToDrain = 0; hasDrainedFuel = true; break; }
                        else { fuelToDrain -= p.fuelRemaining; p.fuelRemaining = 0; hasDrainedFuel = true; }
                    }
                }
                if (hasDrainedFuel) {
                    Body.applyForce(activeShip, activeShip.position, { x: engineData.thrust * Math.sin(activeShip.angle), y: -engineData.thrust * Math.cos(activeShip.angle) });
                    isEngineBurning = true;
                }
            }

            if (isLaunched) {
                if (keys['KeyA'] || keys['ArrowLeft']) Body.setAngularVelocity(activeShip, activeShip.angularVelocity - 0.0006);
                if (keys['KeyD'] || keys['ArrowRight']) Body.setAngularVelocity(activeShip, activeShip.angularVelocity + 0.0006);
            }

            // Telemetry
            let stageFuelMax = 0, stageFuelRemaining = 0;
            if (activeEngineLocalIndex !== -1) {
                for(let i = stageStartIndex; i <= stageEndIndex; i++) {
                    let p = activeShip.partsData[i]; if(p.type === 'tank') { stageFuelMax += p.fuelCapacity; stageFuelRemaining += p.fuelRemaining; }
                }
            }
            let currentDist = Vector.magnitude(Vector.sub(PLANET_POS, activeShip.position));
            let altitudeRaw = currentDist - PLANET_RADIUS;
            let speedRaw = Vector.magnitude(activeShip.velocity) * 5;
            document.getElementById('tel-alt').innerText = (altitudeRaw / 100).toFixed(2) + ' km';
            document.getElementById('tel-spd').innerText = Math.floor(speedRaw) + ' m/s';
            document.getElementById('tel-atmo').innerText = atmoPercentDisplay + '%';
            document.getElementById('tel-fuel').innerText = (stageFuelMax > 0 ? Math.floor((stageFuelRemaining / stageFuelMax) * 100) : 0) + '%';

            // Camera
            if(isMapView) {
                let shipDist = Vector.magnitude(Vector.sub(PLANET_POS, activeShip.position));
                mapCameraViewSpan = Math.max(shipDist, PLANET_RADIUS) * 1.5; 
                Render.lookAt(render, { min: { x: PLANET_POS.x - mapCameraViewSpan, y: PLANET_POS.y - mapCameraViewSpan }, max: { x: PLANET_POS.x + mapCameraViewSpan, y: PLANET_POS.y + mapCameraViewSpan } });
            } else {
                let targetZoom = 1 + (Math.max(0, altitudeRaw) * 0.0001);
                targetZoom = Math.min(targetZoom, 4.0); 
                Render.lookAt(render, { min: { x: activeShip.position.x - (window.innerWidth/2) * targetZoom, y: activeShip.position.y - (window.innerHeight/2) * targetZoom }, max: { x: activeShip.position.x + (window.innerWidth/2) * targetZoom, y: activeShip.position.y + (window.innerHeight/2) * targetZoom } });
            }
        }

        // --- THE RELIABLE NUMERIC PREDICTOR ---
        function getPredictivePath() {
            if (!activeShip || !isLaunched) return [];
            let path = [];
            let simPos = { x: activeShip.position.x, y: activeShip.position.y };
            let simVel = { x: activeShip.velocity.x, y: activeShip.velocity.y };
            let dt = 20; // Step size
            
            for(let i=0; i<600; i++) { // Predict 12,000 frames into future
                if (i % 5 === 0) path.push({x: simPos.x, y: simPos.y});
                
                let dx = PLANET_POS.x - simPos.x;
                let dy = PLANET_POS.y - simPos.y;
                let d2 = dx*dx + dy*dy;
                let d = Math.sqrt(d2);
                
                if (d < PLANET_RADIUS) { path.push({x: simPos.x, y: simPos.y}); break; }
                
                let acc = (GRAVITY_CONSTANT) / d2;
                simVel.x += (dx/d) * acc * dt;
                simVel.y += (dy/d) * acc * dt;
                
                // Atmo check
                if (d < PLANET_RADIUS + ATMOSPHERE_HEIGHT) {
                    let density = 1 - ((d - PLANET_RADIUS) / ATMOSPHERE_HEIGHT);
                    simVel.x *= Math.pow(1 - 0.01 * density, dt);
                    simVel.y *= Math.pow(1 - 0.01 * density, dt);
                }

                simPos.x += simVel.x * dt;
                simPos.y += simVel.y * dt;
            }
            return path;
        }

        function customRender() {
            if (mode !== 'flight' || !activeShip) return;
            const ctx = render.context;
            let bounds = render.bounds;
            let scaleX = window.innerWidth / (bounds.max.x - bounds.min.x);
            let scaleY = window.innerHeight / (bounds.max.y - bounds.min.y);

            // 1. Draw Path (Only in Map View)
            if (isMapView) {
                let path = getPredictivePath();
                if (path.length > 1) {
                    ctx.save();
                    ctx.setTransform(1, 0, 0, 1, 0, 0); 
                    ctx.beginPath();
                    ctx.strokeStyle = '#00ccff';
                    ctx.lineWidth = 5; // Thick Screen-Space Line
                    for(let i=0; i<path.length; i++) {
                        let sx = (path[i].x - bounds.min.x) * scaleX;
                        let sy = (path[i].y - bounds.min.y) * scaleY;
                        if(i===0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
                    }
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // 2. Draw Marker
            if (isMapView) {
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                let sx = (activeShip.position.x - bounds.min.x) * scaleX;
                let sy = (activeShip.position.y - bounds.min.y) * scaleY;
                ctx.translate(sx, sy);
                ctx.fillStyle = 'rgba(0, 255, 204, 0.2)';
                ctx.beginPath(); ctx.arc(0, 0, 20, 0, 2*Math.PI); ctx.fill();
                ctx.rotate(activeShip.angle);
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(8, 10); ctx.lineTo(-8, 10); ctx.closePath(); ctx.fill();
                ctx.restore();
            }

            // 3. Exhaust
            if (isEngineBurning && activeEngineLocalIndex !== -1 && !isMapView) {
                let engineSubBody = activeShip.parts[activeEngineLocalIndex + 1];
                if(engineSubBody) {
                    let exX = engineSubBody.position.x - Math.sin(activeShip.angle) * 25;
                    let exY = engineSubBody.position.y + Math.cos(activeShip.angle) * 25;
                    ctx.fillStyle = Math.random() > 0.5 ? '#ffaa00' : '#ff4400';
                    ctx.beginPath(); ctx.arc(exX, exY, 12, 0, 2*Math.PI); ctx.fill();
                }
            }
        }
    </script>
</body>
</html>
