<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Rocket Simulator - Elliptical Projection</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #02040a; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; }
        .panel { position: absolute; background: rgba(10, 15, 25, 0.9); border: 1px solid #334; border-radius: 8px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 10; }
        #build-ui { top: 20px; left: 20px; width: 350px; display: flex; flex-direction: column; gap: 10px; }
        #flight-ui { top: 20px; right: 20px; width: 250px; display: none; flex-direction: column; gap: 15px; }
        h2, h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: #4da8da; letter-spacing: 1px; }
        .btn { background: #1e293b; color: white; border: 1px solid #4da8da; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #4da8da; color: #000; }
        .btn-launch { background: #28a745; border-color: #28a745; margin-top: 10px; }
        .btn-launch:hover { background: #218838; color: white; }
        .build-container { display: flex; gap: 15px; }
        .controls-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .visualizer-col { width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-height: 250px; background: rgba(0,0,0,0.5); border: 1px dashed #556; padding: 5px; }
        #stage-list { background: rgba(0,0,0,0.5); border-radius: 4px; padding: 10px; max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .stage-item { background: #0f172a; padding: 5px; border-radius: 3px; font-size: 0.85rem; }
        .stage-active { border-left: 3px solid #28a745; background: #1e293b; }
        .telemetry-row { display: flex; justify-content: space-between; border-bottom: 1px solid #334; padding-bottom: 5px; font-family: monospace; font-size: 1.1rem; }
        .telemetry-label { color: #8892b0; font-size: 0.9rem;}
        #controls-help { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; display: none; color: #ccc; z-index: 10; border: 1px solid #4da8da; }
        .bp-part { border: 1px solid rgba(255,255,255,0.2); width: 100%; text-align: center; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="build-ui" class="panel">
        <h2>VAB (Assembly)</h2>
        <div class="build-container">
            <div class="controls-col">
                <button class="btn" onclick="addPart('parachute')">+ Parachute</button>
                <button class="btn" onclick="addPart('tank')">+ Fuel Tank</button>
                <button class="btn" onclick="addPart('decoupler')">+ Decoupler</button>
                <button class="btn" style="border-color: #4444ff;" onclick="addPart('vacuum')">+ Vacuum Engine</button>
                <button class="btn" style="border-color: #ffaa00;" onclick="addPart('booster')">+ Standard Booster</button>
                <button class="btn" style="border-color: #ff2222; background: #3a1515;" onclick="addPart('heavy')">+ Heavy Lift Engine</button>
                <button class="btn" onclick="resetBuild()" style="background: #4a1515; border-color: #ff4444; margin-top:5px;">Clear Rocket</button>
            </div>
            <div class="visualizer-col" id="blueprint-visualizer"></div>
        </div>
        <h3 style="margin-top: 15px;">Staging (Bottom Up)</h3>
        <div id="stage-list"></div>
        <button class="btn btn-launch" onclick="launch()">INITIATE LAUNCH</button>
    </div>

    <div id="flight-ui" class="panel">
        <h2>Telemetry</h2>
        <button class="btn btn-map" id="map-toggle" style="width: 100%; margin-bottom: 15px;" onclick="toggleMap()">[M] MAP VIEW: OFF</button>
        <div class="telemetry-row"><span class="telemetry-label">ALTITUDE</span><span id="tel-alt">0 km</span></div>
        <div class="telemetry-row"><span class="telemetry-label">SPEED</span><span id="tel-spd">0 m/s</span></div>
        <div class="telemetry-row"><span class="telemetry-label">ATMO DENSITY</span><span id="tel-atmo">100%</span></div>
        <div class="telemetry-row" style="margin-top: 10px;"><span class="telemetry-label">STAGE FUEL</span><span id="tel-fuel">100%</span></div>
    </div>

    <div id="controls-help">[W/UP] Thrust | [A/D] Steer | [SPACE] Stage | [M] Map View</div>

    <script>
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
              Bodies = Matter.Bodies, Body = Matter.Body, Composite = Matter.Composite,
              Vector = Matter.Vector, Events = Matter.Events;

        let engine, render, runner;
        let mode = 'build', keys = {}, isLaunched = false, isMapView = false;
        let podPart = { type: 'pod', name: 'Cmd Pod', mass: 0.5, height: 40, width: 30, color: '#dddddd' };
        let rocketParts = [podPart], activeShip, debrisBodies = [], activeEngineLocalIndex = -1, currentStageIndex = 0;
        
        const PLANET_RADIUS = 500000, PLANET_POS = { x: 0, y: 0 }, ATMOSPHERE_HEIGHT = 50000;
        const GRAVITY_CONSTANT = 25000000000; 
        let mapCameraViewSpan = PLANET_RADIUS * 1.5;

        updateUI();

        function addPart(type) {
            let part;
            if (type === 'parachute') {
                if (rocketParts[0].type === 'parachute') return;
                rocketParts.unshift({ type: 'parachute', name: 'Parachute', mass: 0.1, height: 15, width: 20, color: '#ff4444' });
                updateUI(); return;
            } else if (type === 'tank') {
                part = { type: 'tank', name: 'Fuel Tank', mass: 0.6, fuelCapacity: 2000, fuelRemaining: 2000, height: 60, width: 40, color: '#ff8800' };
            } else if (type === 'decoupler') {
                part = { type: 'decoupler', name: 'Decoupler', mass: 0.1, height: 8, width: 42, color: '#888888' };
            } else if (type === 'vacuum') {
                part = { type: 'engine', name: 'Vac Engine', mass: 0.4, thrust: 0.15, fuelDrain: 0.2, height: 25, width: 20, color: '#4444ff' }; 
            } else if (type === 'booster') {
                part = { type: 'engine', name: 'Booster', mass: 1.0, thrust: 0.65, fuelDrain: 2.0, height: 45, width: 28, color: '#ffaa00' }; 
            } else if (type === 'heavy') {
                part = { type: 'engine', name: 'Heavy Lift', mass: 2.5, thrust: 1.6, fuelDrain: 6.0, height: 55, width: 36, color: '#ff2222' }; 
            }
            rocketParts.push(JSON.parse(JSON.stringify(part)));
            updateUI();
        }

        function resetBuild() { rocketParts = [JSON.parse(JSON.stringify(podPart))]; updateUI(); }

        function updateUI() {
            const vis = document.getElementById('blueprint-visualizer');
            vis.innerHTML = '';
            rocketParts.forEach(part => {
                let div = document.createElement('div'); div.className = 'bp-part';
                div.style.height = part.height + 'px'; div.style.width = part.width + 'px'; div.style.backgroundColor = part.color;
                div.innerText = part.name.substring(0,3); vis.appendChild(div);
            });
            const list = document.getElementById('stage-list');
            list.innerHTML = '';
            rocketParts.slice().reverse().forEach((part, idx) => {
                let realIndex = rocketParts.length - 1 - idx;
                let div = document.createElement('div'); div.className = `stage-item`; div.id = `stage-ui-${realIndex}`;
                div.innerHTML = `<span>[Stage ${idx + 1}] ${part.name}</span>`; list.appendChild(div);
            });
            currentStageIndex = rocketParts.length - 1; highlightCurrentStage();
        }

        function highlightCurrentStage() {
            document.querySelectorAll('.stage-item').forEach(el => el.classList.remove('stage-active'));
            if(document.getElementById(`stage-ui-${currentStageIndex}`)) document.getElementById(`stage-ui-${currentStageIndex}`).classList.add('stage-active');
        }

        function createShipCompound(partsData) {
            let bodies = [], currentY = 0, totalMass = 0;
            for (let i = 0; i < partsData.length; i++) {
                let p = partsData[i], b = Bodies.rectangle(0, currentY + p.height / 2, p.width, p.height, { render: { fillStyle: p.color }});
                b.partData = p; bodies.push(b); currentY += p.height; totalMass += p.mass;
            }
            let compound = Body.create({ parts: bodies, mass: totalMass, frictionAir: 0.00 }); 
            compound.partsData = partsData; return compound;
        }

        function launch() {
            mode = 'flight'; document.getElementById('build-ui').style.display = 'none'; document.getElementById('flight-ui').style.display = 'flex';
            document.getElementById('controls-help').style.display = 'block'; initPhysics();
        }

        function initPhysics() {
            engine = Engine.create({ positionIterations: 12, velocityIterations: 12 });
            engine.gravity.scale = 0; 
            render = Render.create({ element: document.body, engine: engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#02040a' }});
            planetBody = Bodies.circle(0, 0, PLANET_RADIUS, { isStatic: true, friction: 1, render: { fillStyle: '#111', strokeStyle: '#222', lineWidth: 10 } });
            let pad = Bodies.rectangle(0, -PLANET_RADIUS - 10, 1000, 20, { isStatic: true, friction: 1, render: { fillStyle: '#333' }});
            Composite.add(engine.world, [planetBody, pad]);
            activeShip = createShipCompound(JSON.parse(JSON.stringify(rocketParts)));
            Body.setPosition(activeShip, {x: 0, y: -PLANET_RADIUS - 30 - (activeShip.bounds.max.y - activeShip.bounds.min.y)/2});
            Body.setStatic(activeShip, true); 
            Composite.add(engine.world, activeShip); updateActiveEngine();
            Render.run(render); runner = Runner.create(); Runner.run(runner, engine);
            Events.on(engine, 'beforeUpdate', gameLoop); Events.on(render, 'afterRender', customRender);
        }

        function updateActiveEngine() {
            activeEngineLocalIndex = -1;
            for (let i = activeShip.partsData.length - 1; i >= 0; i--) { if (activeShip.partsData[i].type === 'engine') { activeEngineLocalIndex = i; break; } }
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && mode === 'flight') stageRocket();
            if (e.code === 'KeyM' && mode === 'flight') toggleMap();
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        function toggleMap() { isMapView = !isMapView; document.getElementById('map-toggle').innerText = isMapView ? "[M] MAP VIEW: ON" : "[M] MAP VIEW: OFF"; }

        function stageRocket() {
            if (!isLaunched) { isLaunched = true; Body.setStatic(activeShip, false); }
            if (currentStageIndex < 0) return;
            while (currentStageIndex >= 0) {
                let part = activeShip.partsData[currentStageIndex];
                document.getElementById(`stage-ui-${currentStageIndex}`).style.opacity = '0.3';
                if (part.type === 'parachute') { Body.set(activeShip, 'frictionAir', 0.8); currentStageIndex--; break; }
                if (part.type === 'decoupler') {
                    let topData = activeShip.partsData.slice(0, currentStageIndex), bottomData = activeShip.partsData.slice(currentStageIndex);
                    let oldAngle = activeShip.angle, oldVel = activeShip.velocity, oldPos = { x: activeShip.position.x, y: activeShip.position.y };
                    Composite.remove(engine.world, activeShip);
                    activeShip = createShipCompound(topData);
                    Body.setPosition(activeShip, oldPos); Body.setAngle(activeShip, oldAngle); Body.setVelocity(activeShip, oldVel);
                    Composite.add(engine.world, activeShip);
                    let debris = createShipCompound(bottomData); Body.setPosition(debris, oldPos); Body.setAngle(debris, oldAngle); Body.setVelocity(debris, oldVel);
                    Composite.add(engine.world, debris); debrisBodies.push(debris);
                    currentStageIndex--; break; 
                }
                currentStageIndex--;
            }
            updateActiveEngine(); highlightCurrentStage();
        }

        let isEngineBurning = false;

        function gameLoop() {
            if (!activeShip) return;
            let atmoPercent = 100; isEngineBurning = false;
            let all = [activeShip, ...debrisBodies];
            all.forEach(body => {
                if(!body) return;
                let dx = -body.position.x, dy = -body.position.y, d2 = dx*dx + dy*dy, d = Math.sqrt(d2);
                if (isLaunched && d > PLANET_RADIUS) Body.applyForce(body, body.position, {x: (dx/d)*(GRAVITY_CONSTANT*body.mass/d2), y: (dy/d)*(GRAVITY_CONSTANT*body.mass/d2)});
                let alt = d - PLANET_RADIUS, dens = Math.max(0, 1 - (alt / ATMOSPHERE_HEIGHT));
                if (body === activeShip) atmoPercent = Math.floor(dens * 100);
                if(body.partsData && body.partsData[0].type !== 'parachute') Body.set(body, 'frictionAir', 0.005 * dens);
            });

            if ((keys['KeyW'] || keys['ArrowUp']) && activeEngineLocalIndex !== -1) {
                if (!isLaunched) { isLaunched = true; Body.setStatic(activeShip, false); }
                let engineData = activeShip.partsData[activeEngineLocalIndex], fuelToDrain = engineData.fuelDrain || 1.0, hasFuel = false;
                for(let i = activeShip.partsData.length - 1; i >= 0; i--) {
                    let p = activeShip.partsData[i];
                    if(p.type === 'tank' && p.fuelRemaining > 0) {
                        let drain = Math.min(p.fuelRemaining, fuelToDrain); p.fuelRemaining -= drain; hasFuel = true; break;
                    }
                    if(p.type === 'decoupler') break;
                }
                if (hasFuel) { Body.applyForce(activeShip, activeShip.position, { x: engineData.thrust * Math.sin(activeShip.angle), y: -engineData.thrust * Math.cos(activeShip.angle) }); isEngineBurning = true; }
            }

            if (isLaunched) {
                if (keys['KeyA'] || keys['ArrowLeft']) Body.setAngularVelocity(activeShip, activeShip.angularVelocity - 0.0006);
                if (keys['KeyD'] || keys['ArrowRight']) Body.setAngularVelocity(activeShip, activeShip.angularVelocity + 0.0006);
            }

            let fuelRemaining = 0, fuelMax = 0;
            activeShip.partsData.forEach(p => { if(p.type === 'tank') { fuelMax += p.fuelCapacity; fuelRemaining += p.fuelRemaining; }});
            let dist = Vector.magnitude(activeShip.position);
            document.getElementById('tel-alt').innerText = ((dist - PLANET_RADIUS) / 100).toFixed(2) + ' km';
            document.getElementById('tel-spd').innerText = Math.floor(Vector.magnitude(activeShip.velocity) * 10) + ' m/s';
            document.getElementById('tel-atmo').innerText = atmoPercent + '%';
            document.getElementById('tel-fuel').innerText = (fuelMax > 0 ? Math.floor((fuelRemaining / fuelMax) * 100) : 0) + '%';

            if(isMapView) {
                mapCameraViewSpan = Math.max(dist, PLANET_RADIUS) * 1.5; 
                Render.lookAt(render, { min: { x: -mapCameraViewSpan, y: -mapCameraViewSpan }, max: { x: mapCameraViewSpan, y: mapCameraViewSpan } });
            } else {
                let zoom = 1 + ((dist - PLANET_RADIUS) * 0.0001);
                Render.lookAt(render, { min: { x: activeShip.position.x - (window.innerWidth/2)*zoom, y: activeShip.position.y - (window.innerHeight/2)*zoom }, max: { x: activeShip.position.x + (window.innerWidth/2)*zoom, y: activeShip.position.y + (window.innerHeight/2)*zoom } });
            }
        }

        // --- NEW ANALYTICAL ORBITAL PREDICTOR ---
        function getPredictivePath() {
            if (!activeShip || !isLaunched) return [];
            let points = [];
            let pos = { x: activeShip.position.x, y: activeShip.position.y };
            let vel = { x: activeShip.velocity.x, y: activeShip.velocity.y };
            
            // Numerical "Ghost" but with high precision and massive step
            let simPos = { ...pos };
            let simVel = { ...vel };
            let dt = 150; // Huge time jump per point
            
            for (let i = 0; i < 1500; i++) {
                points.push({ x: simPos.x, y: simPos.y });
                
                let dx = -simPos.x;
                let dy = -simPos.y;
                let d2 = dx*dx + dy*dy;
                let d = Math.sqrt(d2);
                
                if (d < PLANET_RADIUS) break;
                
                // Acceleration
                let acc = GRAVITY_CONSTANT / d2;
                simVel.x += (dx/d) * acc * dt;
                simVel.y += (dy/d) * acc * dt;
                
                simPos.x += simVel.x * dt;
                simPos.y += simVel.y * dt;

                // Stop if we go way off screen or return to start
                if (i > 10 && Vector.magnitude(Vector.sub(simPos, pos)) < 10000) {
                    points.push({ ...pos }); // Close the circle
                    break;
                }
                if (d > PLANET_RADIUS * 10) break;
            }
            return points;
        }

        function customRender() {
            if (mode !== 'flight' || !activeShip) return;
            const ctx = render.context;
            let bounds = render.bounds;
            let scale = window.innerWidth / (bounds.max.x - bounds.min.x);
            
            if (isMapView) {
                let path = getPredictivePath();
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0); 
                ctx.beginPath();
                ctx.strokeStyle = '#00f2ff';
                ctx.lineWidth = 5;
                path.forEach((p, i) => {
                    let sx = (p.x - bounds.min.x) * scale;
                    let sy = (p.y - bounds.min.y) * scale;
                    if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
                });
                ctx.stroke();

                // Draw Marker
                let sx = (activeShip.position.x - bounds.min.x) * scale;
                let sy = (activeShip.position.y - bounds.min.y) * scale;
                ctx.translate(sx, sy);
                ctx.rotate(activeShip.angle);
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.moveTo(0, -15); ctx.lineTo(10, 12); ctx.lineTo(-10, 12);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            if (isEngineBurning && !isMapView) {
                let eng = activeShip.parts[activeEngineLocalIndex + 1];
                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.arc(eng.position.x - Math.sin(activeShip.angle)*25, eng.position.y + Math.cos(activeShip.angle)*25, 15, 0, 7);
                ctx.fill();
            }
        }
    </script>
</body>
</html>
