<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Rocket Builder & Simulator V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #4da8da; /* Sky color start */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white;
            transition: background-color 0.5s;
        }

        .panel {
            position: absolute; background: rgba(15, 20, 35, 0.9);
            border: 1px solid #334; border-radius: 8px; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        }

        /* Assembly UI */
        #build-ui {
            top: 20px; left: 20px; width: 350px; display: flex; flex-direction: column; gap: 10px;
        }

        #flight-ui {
            top: 20px; right: 20px; width: 250px; display: none; flex-direction: column; gap: 15px;
        }

        h2, h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: #4da8da; text-transform: uppercase; letter-spacing: 1px; }

        .btn {
            background: #2a3b5c; color: white; border: 1px solid #4da8da;
            padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s;
        }
        .btn:hover { background: #4da8da; color: #000; }
        .btn-launch { background: #28a745; border-color: #28a745; margin-top: 15px; }
        .btn-launch:hover { background: #218838; color: white; }

        .build-container { display: flex; gap: 15px; align-items: flex-start; }
        .controls-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .visualizer-col { width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-height: 250px; background: rgba(0,0,0,0.3); border-radius: 4px; padding: 10px; border: 1px dashed #556; }

        /* Staging List */
        #stage-list { background: rgba(0,0,0,0.5); border-radius: 4px; padding: 10px; max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .stage-item { background: #1e293b; padding: 5px 10px; border-radius: 3px; font-size: 0.9rem; }
        .stage-active { border-left: 3px solid #28a745; background: #2a3b5c; }

        /* Telemetry Elements */
        .telemetry-row { display: flex; justify-content: space-between; border-bottom: 1px solid #334; padding-bottom: 5px; font-family: monospace; font-size: 1.1rem; }
        .telemetry-label { color: #8892b0; }

        .meter-container { height: 15px; background: #111; border: 1px solid #444; border-radius: 8px; overflow: hidden; position: relative; }
        .meter-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #4da8da 0%, #0a0a1a 100%); transition: width 0.1s linear; }

        #controls-help {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; display: none; color: #ccc; z-index: 10;
        }

        /* Blueprint Visuals */
        .bp-part { border: 1px solid rgba(255,255,255,0.2); width: 100%; text-align: center; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; overflow: hidden;}
    </style>
</head>
<body>

    <div id="build-ui" class="panel">
        <h2>Assembly Bay</h2>
        <div class="build-container">
            <div class="controls-col">
                <button class="btn" onclick="addParachute()">+ Parachute (Top)</button>
                <button class="btn" onclick="addPart('tank')">+ Fuel Tank</button>
                <button class="btn" onclick="addPart('decoupler')">+ Decoupler</button>
                <button class="btn" onclick="addPart('engine')">+ Rocket Engine</button>
                <button class="btn" onclick="resetBuild()" style="background: #662222; border-color: #ff4444; margin-top:10px;">Clear Rocket</button>
            </div>
            <div class="visualizer-col" id="blueprint-visualizer">
                </div>
        </div>
        
        <h3 style="margin-top: 15px;">Staging Stack (Bottom Up)</h3>
        <div id="stage-list"></div>
        <button class="btn btn-launch" onclick="launch()">INITIATE LAUNCH</button>
    </div>

    <div id="flight-ui" class="panel">
        <h2>Telemetry</h2>
        <div class="telemetry-row"><span class="telemetry-label">ALTITUDE</span><span id="tel-alt">0 m</span></div>
        <div class="telemetry-row"><span class="telemetry-label">SPEED</span><span id="tel-spd">0 m/s</span></div>
        <div class="telemetry-row"><span class="telemetry-label">FUEL</span><span id="tel-fuel">100%</span></div>
        <div style="margin-top: 10px;">
            <div class="telemetry-label" style="margin-bottom: 5px; font-size: 0.9rem;">ATMOSPHERE DENSITY</div>
            <div class="meter-container"><div id="atmo-meter" class="meter-fill"></div></div>
        </div>
    </div>

    <div id="controls-help">[W / UP] Thrust | [A / D] Steer | [SPACE] Trigger Next Stage</div>

    <script>
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
              Bodies = Matter.Bodies, Body = Matter.Body, Composite = Matter.Composite,
              Constraint = Matter.Constraint, Vector = Matter.Vector, Events = Matter.Events;

        let engine, render, runner;
        let mode = 'build';
        let keys = {};
        
        // Base Pod setup
        const podPart = { type: 'pod', name: 'Cmd Pod', mass: 1, height: 40, width: 30, color: '#dddddd' };
        let rocketParts = [podPart];
        
        let physicalBodies = [];
        let constraints = [];
        let activeEngineIndex = -1;
        let totalFuel = 0; let currentFuel = 0;
        let parachuteDeployed = false;
        let clouds = [];
        let currentStageIndex = 0;

        const MAX_ALTITUDE = 15000;
        const CAMERA_BASE_ZOOM = 1;

        updateUI();

        function addParachute() {
            if (rocketParts[0].type === 'parachute') return; // Only one parachute
            rocketParts.unshift({ type: 'parachute', name: 'Parachute', mass: 0.2, height: 15, width: 20, color: '#ff4444' });
            updateUI();
        }

        function addPart(type) {
            let part;
            if (type === 'tank') {
                part = { type: 'tank', name: 'Fuel Tank', mass: 2, fuel: 100, height: 60, width: 40, color: '#ff8800' };
                totalFuel += 100;
            } else if (type === 'decoupler') {
                part = { type: 'decoupler', name: 'Decoupler', mass: 0.5, height: 10, width: 42, color: '#888888' };
            } else if (type === 'engine') {
                part = { type: 'engine', name: 'Engine', mass: 1.5, thrust: 0.015, height: 35, width: 24, color: '#4444ff' }; // Reduced thrust
            }
            rocketParts.push(part);
            updateUI();
        }

        function resetBuild() {
            rocketParts = [podPart];
            totalFuel = 0;
            updateUI();
        }

        function updateUI() {
            // Blueprint Visualizer
            const vis = document.getElementById('blueprint-visualizer');
            vis.innerHTML = '';
            rocketParts.forEach(part => {
                let div = document.createElement('div');
                div.className = 'bp-part';
                div.style.height = (part.height) + 'px';
                div.style.width = (part.width) + 'px';
                div.style.backgroundColor = part.color;
                div.innerText = part.name.substring(0,3);
                vis.appendChild(div);
            });

            // Staging List (Show bottom up so user triggers bottom items first)
            const list = document.getElementById('stage-list');
            list.innerHTML = '';
            let stages = rocketParts.slice().reverse(); // Reverse for UI display (bottom is top of list)
            stages.forEach((part, idx) => {
                let realIndex = rocketParts.length - 1 - idx;
                let div = document.createElement('div');
                div.className = `stage-item`;
                div.id = `stage-ui-${realIndex}`;
                div.innerHTML = `<span>[Stage ${idx + 1}] ${part.name}</span>`;
                list.appendChild(div);
            });
            currentStageIndex = rocketParts.length - 1; // Start staging from the bottom
            highlightCurrentStage();
        }

        function highlightCurrentStage() {
            document.querySelectorAll('.stage-item').forEach(el => el.classList.remove('stage-active'));
            if(document.getElementById(`stage-ui-${currentStageIndex}`)) {
                document.getElementById(`stage-ui-${currentStageIndex}`).classList.add('stage-active');
            }
        }

        function generateClouds() {
            for(let i=0; i<60; i++) {
                clouds.push({
                    x: (Math.random() * window.innerWidth * 3) - window.innerWidth,
                    y: -(Math.random() * MAX_ALTITUDE) + window.innerHeight,
                    size: Math.random() * 80 + 30,
                    opacity: Math.random() * 0.4 + 0.1
                });
            }
        }

        function launch() {
            mode = 'flight';
            document.getElementById('build-ui').style.display = 'none';
            document.getElementById('flight-ui').style.display = 'flex';
            document.getElementById('controls-help').style.display = 'block';
            currentFuel = totalFuel;
            generateClouds();
            initPhysics();
        }

        function initPhysics() {
            engine = Engine.create();
            engine.gravity.y = 1;

            render = Render.create({
                element: document.body,
                engine: engine,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
            });

            // Ground
            const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight - 20, window.innerWidth * 5, 40, { 
                isStatic: true, render: { fillStyle: '#223322' } 
            });
            Composite.add(engine.world, ground);

            let startY = window.innerHeight - 60;
            let currentY = startY;

            // Build physical stack bottom-up to rest on ground
            for (let i = rocketParts.length - 1; i >= 0; i--) {
                const part = rocketParts[i];
                let body = Bodies.rectangle(window.innerWidth / 2, currentY - (part.height / 2), part.width, part.height, {
                    mass: part.mass, frictionAir: 0.01, render: { fillStyle: part.color }
                });
                body.partData = part; body.partIndex = i;
                physicalBodies[i] = body; // Map directly to array index
                Composite.add(engine.world, body);
                currentY -= part.height;
            }

            // Dual Constraints for rigid connections (Prevents flopping)
            for (let i = 0; i < rocketParts.length - 1; i++) {
                let topBody = physicalBodies[i];
                let bottomBody = physicalBodies[i+1];
                let connectionWidth = Math.min(topBody.bounds.max.x - topBody.bounds.min.x, bottomBody.bounds.max.x - bottomBody.bounds.min.x) / 2 - 2;

                // Left Joint
                let cLeft = Constraint.create({
                    bodyA: topBody, bodyB: bottomBody,
                    pointA: { x: -connectionWidth, y: topBody.bounds.max.y - topBody.position.y },
                    pointB: { x: -connectionWidth, y: bottomBody.bounds.min.y - bottomBody.position.y },
                    stiffness: 1, render: { visible: false }
                });
                // Right Joint
                let cRight = Constraint.create({
                    bodyA: topBody, bodyB: bottomBody,
                    pointA: { x: connectionWidth, y: topBody.bounds.max.y - topBody.position.y },
                    pointB: { x: connectionWidth, y: bottomBody.bounds.min.y - bottomBody.position.y },
                    stiffness: 1, render: { visible: false }
                });
                
                // Store joint link data so we know which to break during staging
                cLeft.jointIndex = i; cRight.jointIndex = i;
                constraints.push(cLeft, cRight);
                Composite.add(engine.world, [cLeft, cRight]);
            }

            updateActiveEngine();
            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            Events.on(engine, 'beforeUpdate', gameLoop);
            Events.on(render, 'afterRender', drawEffects);
        }

        function updateActiveEngine() {
            activeEngineIndex = -1;
            // Find lowest active engine still attached
            for (let i = physicalBodies.length - 1; i >= 0; i--) {
                if (physicalBodies[i] && physicalBodies[i].partData.type === 'engine') {
                    activeEngineIndex = i; break;
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && mode === 'flight') stageRocket();
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        function stageRocket() {
            if (currentStageIndex < 0) return;

            let partBody = physicalBodies[currentStageIndex];
            if (!partBody) { currentStageIndex--; return; }

            // Update UI list visually
            let uiEl = document.getElementById(`stage-ui-${currentStageIndex}`);
            if(uiEl) uiEl.style.opacity = '0.3';

            if (partBody.partData.type === 'parachute') {
                parachuteDeployed = true;
                // Add massive drag to the top piece
                Body.set(partBody, 'frictionAir', 0.15);
                partBody.render.fillStyle = '#ffffff'; 
            } 
            else if (partBody.partData.type === 'decoupler') {
                // Break constraints connecting this decoupler to the part ABOVE it (jointIndex = currentStageIndex - 1)
                let jointToBreak = currentStageIndex - 1;
                let constraintsToRemove = constraints.filter(c => c.jointIndex === jointToBreak);
                
                constraintsToRemove.forEach(c => Composite.remove(engine.world, c));
                
                // Pop the decoupled pieces apart slightly
                if(physicalBodies[currentStageIndex]) Body.applyForce(physicalBodies[currentStageIndex], physicalBodies[currentStageIndex].position, {x: 0, y: 0.02});
                if(physicalBodies[currentStageIndex-1]) Body.applyForce(physicalBodies[currentStageIndex-1], physicalBodies[currentStageIndex-1].position, {x: 0, y: -0.02});
            }

            // Stop applying thrust to engines that have been dropped
            if (partBody.partData.type === 'decoupler' || partBody.partData.type === 'tank') {
                 // Disconnect tracking from this index downwards
                 for(let i = currentStageIndex; i < physicalBodies.length; i++) {
                     physicalBodies[i] = null; 
                 }
            }
            
            currentStageIndex--;
            updateActiveEngine();
            highlightCurrentStage();
        }

        function drawEffects() {
            if (mode !== 'flight') return;
            const ctx = render.context;
            
            // Draw Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            clouds.forEach(c => {
                ctx.globalAlpha = c.opacity;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.size, 0, Math.PI*2);
                ctx.arc(c.x+c.size*0.5, c.y-c.size*0.2, c.size*0.8, 0, Math.PI*2);
                ctx.arc(c.x-c.size*0.4, c.y-c.size*0.1, c.size*0.6, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Draw Engine Exhaust
            if ((keys['KeyW'] || keys['ArrowUp']) && currentFuel > 0 && activeEngineIndex !== -1) {
                let engineBody = physicalBodies[activeEngineIndex];
                if(engineBody) {
                    let angle = engineBody.angle;
                    // Calculate exhaust position at bottom of engine
                    let exX = engineBody.position.x - Math.sin(angle) * (engineBody.partData.height/2);
                    let exY = engineBody.position.y + Math.cos(angle) * (engineBody.partData.height/2);
                    
                    ctx.fillStyle = Math.random() > 0.5 ? '#ffaa00' : '#ff4400';
                    ctx.beginPath();
                    ctx.arc(exX, exY, 8 + Math.random()*5, 0, 2*Math.PI);
                    ctx.fill();
                }
            }
        }

        function gameLoop() {
            if (mode !== 'flight') return;

            // Base camera tracking off the Pod (index 0 or 1 if parachute is present)
            let trackBody = physicalBodies[0] || physicalBodies[1]; 
            if (!trackBody) return;

            if ((keys['KeyW'] || keys['ArrowUp']) && currentFuel > 0 && activeEngineIndex !== -1) {
                let engineBody = physicalBodies[activeEngineIndex];
                if (engineBody) {
                    let force = { x: engineBody.partData.thrust * Math.sin(engineBody.angle), y: -engineBody.partData.thrust * Math.cos(engineBody.angle) };
                    Body.applyForce(engineBody, engineBody.position, force);
                    currentFuel -= 0.2;
                }
            }

            // Steer the command pod
            let steerBody = physicalBodies.find(b => b && b.partData.type === 'pod');
            if (steerBody) {
                if (keys['KeyA'] || keys['ArrowLeft']) Body.setAngularVelocity(steerBody, steerBody.angularVelocity - 0.003);
                if (keys['KeyD'] || keys['ArrowRight']) Body.setAngularVelocity(steerBody, steerBody.angularVelocity + 0.003);
            }

            // Telemetry Update
            let startY = window.innerHeight - 60;
            let currentAlt = Math.max(0, startY - trackBody.position.y);
            let speed = Vector.magnitude(trackBody.velocity) * 10;
            
            document.getElementById('tel-alt').innerText = Math.floor(currentAlt) + ' m';
            document.getElementById('tel-spd').innerText = Math.floor(speed) + ' m/s';
            document.getElementById('tel-fuel').innerText = (totalFuel > 0 ? Math.max(0, Math.floor((currentFuel / totalFuel) * 100)) : 0) + '%';

            let atmoPercent = Math.max(0, 100 - (currentAlt / MAX_ALTITUDE) * 100);
            document.getElementById('atmo-meter').style.width = atmoPercent + '%';

            // Sky color transition
            let skyR = Math.floor((atmoPercent / 100) * 77);
            let skyG = Math.floor((atmoPercent / 100) * 168);
            let skyB = Math.floor((atmoPercent / 100) * 218);
            document.body.style.backgroundColor = `rgb(${skyR}, ${skyG}, ${skyB})`;

            // Reduced gravity at high altitude
            engine.gravity.scale = 0.001 * Math.max(0.1, atmoPercent / 100);

            // Dynamic Camera Zoom
            let targetZoom = CAMERA_BASE_ZOOM + (speed * 0.015) + (currentAlt * 0.0001);
            targetZoom = Math.min(targetZoom, 2.5); // Max zoom

            Render.lookAt(render, {
                min: { x: trackBody.position.x - (window.innerWidth/2) * targetZoom, y: trackBody.position.y - (window.innerHeight/2) * targetZoom },
                max: { x: trackBody.position.x + (window.innerWidth/2) * targetZoom, y: trackBody.position.y + (window.innerHeight/2) * targetZoom }
            });
        }
    </script>
</body>
</html>
