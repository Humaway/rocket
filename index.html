<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Rocket Builder & Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .panel {
            position: absolute;
            background: rgba(15, 20, 35, 0.9);
            border: 1px solid #334;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        /* Assembly UI - Left Side */
        #build-ui {
            top: 20px;
            left: 20px;
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Telemetry UI - Right Side */
        #flight-ui {
            top: 20px;
            right: 20px;
            width: 250px;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        h2, h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #4da8da;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            background: #2a3b5c;
            color: white;
            border: 1px solid #4da8da;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn:hover { background: #4da8da; color: #000; }
        .btn-launch { background: #28a745; border-color: #28a745; margin-top: 15px; }
        .btn-launch:hover { background: #218838; color: white; }

        /* Staging List */
        #stage-list {
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stage-item {
            background: #1e293b;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .stage-active {
            border-left: 3px solid #28a745;
            background: #2a3b5c;
        }

        /* Telemetry Elements */
        .telemetry-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #334;
            padding-bottom: 5px;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .telemetry-label { color: #8892b0; }

        /* Atmosphere Meter */
        .meter-container {
            height: 15px;
            background: #111;
            border: 1px solid #444;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        .meter-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4da8da 0%, #0a0a1a 100%);
            transition: width 0.1s linear;
        }

        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: none;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div id="build-ui" class="panel">
        <h2>Assembly Bay</h2>
        <p style="font-size: 0.85rem; color: #aaa; margin: 0 0 10px 0;">Build top to bottom. Command Pod is pre-installed.</p>
        
        <button class="btn" onclick="addPart('parachute')">+ Add Parachute</button>
        <button class="btn" onclick="addPart('tank')">+ Add Fuel Tank</button>
        <button class="btn" onclick="addPart('decoupler')">+ Add Decoupler</button>
        <button class="btn" onclick="addPart('engine')">+ Add Rocket Engine</button>
        
        <h3 style="margin-top: 15px;">Staging Stack</h3>
        <div id="stage-list">
            </div>

        <button class="btn btn-launch" onclick="launch()">INITIATE LAUNCH</button>
    </div>

    <div id="flight-ui" class="panel">
        <h2>Telemetry</h2>
        
        <div class="telemetry-row">
            <span class="telemetry-label">ALTITUDE</span>
            <span id="tel-alt">0 m</span>
        </div>
        
        <div class="telemetry-row">
            <span class="telemetry-label">SPEED</span>
            <span id="tel-spd">0 m/s</span>
        </div>
        
        <div class="telemetry-row">
            <span class="telemetry-label">FUEL</span>
            <span id="tel-fuel">100%</span>
        </div>

        <div style="margin-top: 10px;">
            <div class="telemetry-label" style="margin-bottom: 5px; font-size: 0.9rem;">ATMOSPHERE DENSITY</div>
            <div class="meter-container">
                <div id="atmo-meter" class="meter-fill"></div>
            </div>
        </div>
    </div>

    <div id="controls-help">
        [W / UP] Thrust | [A / D] Steer | [SPACE] Next Stage
    </div>

    <script>
        // Matter.js modules
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Body = Matter.Body,
              Composite = Matter.Composite,
              Constraint = Matter.Constraint,
              Vector = Matter.Vector;

        // Game State
        let engine, render, runner;
        let mode = 'build'; // 'build' or 'flight'
        let keys = {};
        
        // Rocket Data
        let rocketParts = [
            { type: 'pod', name: 'Command Pod', mass: 1, height: 40, width: 30, color: '#dddddd' }
        ];
        
        let physicalBodies = [];
        let constraints = [];
        let activeEngineIndex = -1;
        let totalFuel = 0;
        let currentFuel = 0;
        let parachuteDeployed = false;
        
        // Settings
        const MAX_ALTITUDE = 20000; // where atmosphere ends visually
        const CAMERA_BASE_ZOOM = 1;

        // Initialize Build UI
        updateStageList();

        function addPart(type) {
            let part;
            switch(type) {
                case 'parachute':
                    part = { type: 'parachute', name: 'Parachute', mass: 0.2, height: 10, width: 20, color: '#ff4444' };
                    break;
                case 'tank':
                    part = { type: 'tank', name: 'Fuel Tank', mass: 2, fuel: 100, height: 60, width: 40, color: '#ff8800' };
                    totalFuel += 100;
                    break;
                case 'decoupler':
                    part = { type: 'decoupler', name: 'Decoupler', mass: 0.5, height: 10, width: 42, color: '#888888' };
                    break;
                case 'engine':
                    part = { type: 'engine', name: 'Rocket Engine', mass: 1.5, thrust: 0.05, height: 30, width: 24, color: '#4444ff' };
                    break;
            }
            rocketParts.push(part);
            updateStageList();
        }

        function updateStageList() {
            const list = document.getElementById('stage-list');
            list.innerHTML = '';
            // Display top to bottom
            rocketParts.forEach((part, index) => {
                const div = document.createElement('div');
                div.className = `stage-item ${index === 0 ? 'stage-active' : ''}`;
                div.id = `stage-ui-${index}`;
                div.innerHTML = `<span>${index}. ${part.name}</span>`;
                list.appendChild(div);
            });
        }

        function launch() {
            mode = 'flight';
            document.getElementById('build-ui').style.display = 'none';
            document.getElementById('flight-ui').style.display = 'flex';
            document.getElementById('controls-help').style.display = 'block';
            currentFuel = totalFuel;

            initPhysics();
        }

        function initPhysics() {
            engine = Engine.create();
            engine.gravity.y = 1; // Standard gravity

            render = Render.create({
                element: document.body,
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // Create Ground
            const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight - 20, window.innerWidth * 5, 40, { 
                isStatic: true, 
                render: { fillStyle: '#223322' } 
            });
            Composite.add(engine.world, ground);

            // Build Rocket Physical Bodies (Bottom up visually on screen, based on array)
            let startY = window.innerHeight - 60;
            let currentY = startY;

            // To build the physical stack, we iterate backwards so the first item (pod) ends up on top.
            for (let i = rocketParts.length - 1; i >= 0; i--) {
                const part = rocketParts[i];
                let body = Bodies.rectangle(window.innerWidth / 2, currentY - (part.height / 2), part.width, part.height, {
                    mass: part.mass,
                    frictionAir: 0.01,
                    render: { fillStyle: part.color }
                });
                
                body.partIndex = i;
                body.partData = part;
                physicalBodies.push(body);
                Composite.add(engine.world, body);

                currentY -= part.height;
            }

            // Reverse physicalBodies so index 0 is the pod, matching rocketParts array
            physicalBodies.reverse();

            // Connect bodies with constraints
            for (let i = 0; i < physicalBodies.length - 1; i++) {
                let bodyA = physicalBodies[i]; // Top body
                let bodyB = physicalBodies[i+1]; // Bottom body
                
                let constraint = Constraint.create({
                    bodyA: bodyA,
                    pointA: { x: 0, y: bodyA.bounds.max.y - bodyA.position.y },
                    bodyB: bodyB,
                    pointB: { x: 0, y: bodyB.bounds.min.y - bodyB.position.y },
                    stiffness: 1,
                    render: { visible: false }
                });
                
                constraint.stageIndex = i + 1; // The part being attached below
                constraints.push(constraint);
                Composite.add(engine.world, constraint);
            }

            // Find lowest engine to start
            updateActiveEngine();

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            // Game Loop for Telemetry and Camera
            Matter.Events.on(engine, 'beforeUpdate', gameLoop);
        }

        function updateActiveEngine() {
            activeEngineIndex = -1;
            // Find the lowest engine that is still attached to the pod
            // We check this by tracing constraints. For simplicity, we just find the highest index engine still in world.
            for (let i = physicalBodies.length - 1; i >= 0; i--) {
                if (physicalBodies[i] && physicalBodies[i].partData.type === 'engine') {
                    activeEngineIndex = i;
                    break;
                }
            }
        }

        // --- Controls & Input ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && mode === 'flight') {
                stageRocket();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // "Top to bottom" staging sequence (0 is pod, we detach from bottom usually, 
        // but user asked for simple top-to-bottom UI sequence. We will detach the lowest decoupler or fire parachute).
        let currentStageStep = rocketParts.length - 1; 

        function stageRocket() {
            if (currentStageStep <= 0) return; // Only pod left

            let partToStage = physicalBodies[currentStageStep];
            if (!partToStage) {
                currentStageStep--;
                return;
            }

            // Update UI list
            document.getElementById(`stage-ui-${currentStageStep}`).classList.remove('stage-active');
            document.getElementById(`stage-ui-${currentStageStep}`).style.opacity = '0.3';
            document.getElementById(`stage-ui-${currentStageStep - 1}`).classList.add('stage-active');

            if (partToStage.partData.type === 'parachute') {
                parachuteDeployed = true;
                // Increase drag massively on the pod
                Body.set(physicalBodies[0], 'frictionAir', 0.15);
                partToStage.render.fillStyle = '#ffffff'; // Visual cue
            } 
            else if (partToStage.partData.type === 'decoupler') {
                // Find constraint connecting to the body ABOVE it and break it
                let cIndex = constraints.findIndex(c => c.stageIndex === currentStageStep);
                if (cIndex !== -1) {
                    Composite.remove(engine.world, constraints[cIndex]);
                    
                    // Apply slight separation force
                    Body.applyForce(physicalBodies[currentStageStep], physicalBodies[currentStageStep].position, {x: 0, y: 0.05});
                    Body.applyForce(physicalBodies[currentStageStep-1], physicalBodies[currentStageStep-1].position, {x: 0, y: -0.05});
                }
            }

            // Remove detached parts from tracking so thrust doesn't apply to dropped engines
            physicalBodies[currentStageStep] = null;
            updateActiveEngine();
            currentStageStep--;
        }


        function gameLoop() {
            if (mode !== 'flight') return;

            let pod = physicalBodies[0];
            if (!pod) return;

            // 1. Apply Forces (Thrust & Steering)
            if ((keys['KeyW'] || keys['ArrowUp']) && currentFuel > 0 && activeEngineIndex !== -1) {
                let activeEngineBody = physicalBodies[activeEngineIndex];
                if (activeEngineBody) {
                    // Calculate thrust vector based on pod rotation
                    let angle = pod.angle;
                    let thrustMagnitude = activeEngineBody.partData.thrust;
                    let force = {
                        x: thrustMagnitude * Math.sin(angle),
                        y: -thrustMagnitude * Math.cos(angle)
                    };
                    
                    // Apply to engine position
                    Body.applyForce(activeEngineBody, activeEngineBody.position, force);
                    currentFuel -= 0.2; // Consume fuel
                }
            }

            if (keys['KeyA'] || keys['ArrowLeft']) {
                Body.setAngularVelocity(pod, pod.angularVelocity - 0.005);
            }
            if (keys['KeyD'] || keys['ArrowRight']) {
                Body.setAngularVelocity(pod, pod.angularVelocity + 0.005);
            }

            // 2. Telemetry Calculations
            let startY = window.innerHeight - 60;
            let currentAlt = Math.max(0, startY - pod.position.y); // pixels to meters approx
            let speed = Vector.magnitude(pod.velocity) * 10; // multiplier for better UI numbers
            
            // 3. Update HUD
            document.getElementById('tel-alt').innerText = Math.floor(currentAlt) + ' m';
            document.getElementById('tel-spd').innerText = Math.floor(speed) + ' m/s';
            let fuelPercent = totalFuel > 0 ? Math.max(0, Math.floor((currentFuel / totalFuel) * 100)) : 0;
            document.getElementById('tel-fuel').innerText = fuelPercent + '%';

            // Atmosphere calculation
            let atmoPercent = Math.max(0, 100 - (currentAlt / MAX_ALTITUDE) * 100);
            document.getElementById('atmo-meter').style.width = atmoPercent + '%';

            // Reduce gravity as we leave atmosphere (Fake orbital mechanics)
            let gravityScale = Math.max(0.1, atmoPercent / 100);
            engine.gravity.scale = 0.001 * gravityScale;

            // 4. Camera Tracking & Zoom
            // Dynamic zoom based on speed and altitude
            let targetZoom = CAMERA_BASE_ZOOM + (speed * 0.01) + (currentAlt * 0.0001);
            targetZoom = Math.min(targetZoom, 3); // Max zoom out limit
            
            // Background color change (Sky to Space)
            let skyColor = Math.floor(Math.max(10, 150 - (currentAlt * 0.01)));
            document.body.style.backgroundColor = `rgb(10, 10, ${skyColor})`;

            Render.lookAt(render, {
                min: { x: pod.position.x - (window.innerWidth/2) * targetZoom, y: pod.position.y - (window.innerHeight/2) * targetZoom },
                max: { x: pod.position.x + (window.innerWidth/2) * targetZoom, y: pod.position.y + (window.innerHeight/2) * targetZoom }
            });
        }
    </script>
</body>
</html>
