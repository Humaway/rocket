<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Rocket Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050814; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; }
        .panel { position: absolute; background: rgba(10, 15, 25, 0.9); border: 1px solid #334; border-radius: 8px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 10; }
        
        #build-ui { top: 20px; left: 20px; width: 350px; display: flex; flex-direction: column; gap: 10px; }
        #flight-ui { top: 20px; right: 20px; width: 250px; display: none; flex-direction: column; gap: 15px; }
        
        h2, h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: #4da8da; letter-spacing: 1px; }
        
        .btn { background: #1e293b; color: white; border: 1px solid #4da8da; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #4da8da; color: #000; }
        .btn-launch { background: #28a745; border-color: #28a745; margin-top: 10px; }
        .btn-launch:hover { background: #218838; color: white; }
        .btn-map { background: #eab308; border-color: #ca8a04; color: black; }

        .build-container { display: flex; gap: 15px; }
        .controls-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .visualizer-col { width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-height: 250px; background: rgba(0,0,0,0.5); border: 1px dashed #556; padding: 5px; }
        
        #stage-list { background: rgba(0,0,0,0.5); border-radius: 4px; padding: 10px; max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .stage-item { background: #0f172a; padding: 5px; border-radius: 3px; font-size: 0.85rem; }
        .stage-active { border-left: 3px solid #28a745; background: #1e293b; }

        .telemetry-row { display: flex; justify-content: space-between; border-bottom: 1px solid #334; padding-bottom: 5px; font-family: monospace; font-size: 1.1rem; }
        .telemetry-label { color: #8892b0; }

        #controls-help { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; display: none; color: #ccc; z-index: 10; border: 1px solid #4da8da; }
        .bp-part { border: 1px solid rgba(255,255,255,0.2); width: 100%; text-align: center; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="build-ui" class="panel">
        <h2>VAB (Vehicle Assembly)</h2>
        <div class="build-container">
            <div class="controls-col">
                <button class="btn" onclick="addParachute()">+ Parachute (Top)</button>
                <button class="btn" onclick="addPart('tank')">+ Fuel Tank</button>
                <button class="btn" onclick="addPart('decoupler')">+ Decoupler</button>
                <button class="btn" onclick="addPart('engine')">+ Rocket Engine</button>
                <button class="btn" onclick="resetBuild()" style="background: #4a1515; border-color: #ff4444; margin-top:5px;">Clear Rocket</button>
            </div>
            <div class="visualizer-col" id="blueprint-visualizer"></div>
        </div>
        <h3 style="margin-top: 15px;">Staging (Bottom Up)</h3>
        <div id="stage-list"></div>
        <button class="btn btn-launch" onclick="launch()">INITIATE LAUNCH</button>
    </div>

    <div id="flight-ui" class="panel">
        <h2>Telemetry</h2>
        <button class="btn btn-map" id="map-toggle" style="width: 100%; margin-bottom: 15px;" onclick="toggleMap()">[M] MAP VIEW: OFF</button>
        <div class="telemetry-row"><span class="telemetry-label">ALTITUDE</span><span id="tel-alt">0 km</span></div>
        <div class="telemetry-row"><span class="telemetry-label">SPEED</span><span id="tel-spd">0 m/s</span></div>
        <div class="telemetry-row"><span class="telemetry-label">FUEL</span><span id="tel-fuel">100%</span></div>
    </div>

    <div id="controls-help">[W/UP] Thrust | [A/D] Steer | [SPACE] Stage | [M] Map View</div>

    <script>
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
              Bodies = Matter.Bodies, Body = Matter.Body, Composite = Matter.Composite,
              Constraint = Matter.Constraint, Vector = Matter.Vector, Events = Matter.Events;

        let engine, render, runner;
        let mode = 'build';
        let keys = {};
        
        const podPart = { type: 'pod', name: 'Cmd Pod', mass: 1, height: 40, width: 30, color: '#dddddd' };
        let rocketParts = [podPart];
        
        let physicalBodies = [];
        let constraints = [];
        let activeEngineIndex = -1;
        let totalFuel = 0; let currentFuel = 0;
        let currentStageIndex = 0;
        
        // Orbital Mechanics Variables
        let planetBody;
        const PLANET_RADIUS = 3000;
        const PLANET_POS = { x: 0, y: PLANET_RADIUS + 500 }; 
        const GRAVITY_CONSTANT = 1500000; // Fake G constant for playable orbit speeds
        const ATMOSPHERE_HEIGHT = 1500;
        
        // Map View & Trajectory
        let isMapView = false;
        let trajectory = [];
        let tickCounter = 0;

        updateUI();

        function addParachute() {
            if (rocketParts[0].type === 'parachute') return;
            rocketParts.unshift({ type: 'parachute', name: 'Parachute', mass: 0.2, height: 15, width: 20, color: '#ff4444' });
            updateUI();
        }

        function addPart(type) {
            let part;
            if (type === 'tank') {
                part = { type: 'tank', name: 'Fuel Tank', mass: 1.5, fuel: 500, height: 60, width: 40, color: '#ff8800' };
                totalFuel += 500;
            } else if (type === 'decoupler') {
                part = { type: 'decoupler', name: 'Decoupler', mass: 0.2, height: 8, width: 42, color: '#888888' };
            } else if (type === 'engine') {
                // Thrust reduced, mass balanced for stability
                part = { type: 'engine', name: 'Engine', mass: 1.0, thrust: 0.008, height: 35, width: 24, color: '#4444ff' }; 
            }
            rocketParts.push(part);
            updateUI();
        }

        function resetBuild() { rocketParts = [podPart]; totalFuel = 0; updateUI(); }

        function updateUI() {
            const vis = document.getElementById('blueprint-visualizer');
            vis.innerHTML = '';
            rocketParts.forEach(part => {
                let div = document.createElement('div');
                div.className = 'bp-part';
                div.style.height = part.height + 'px'; div.style.width = part.width + 'px'; div.style.backgroundColor = part.color;
                div.innerText = part.name.substring(0,3);
                vis.appendChild(div);
            });

            const list = document.getElementById('stage-list');
            list.innerHTML = '';
            let stages = rocketParts.slice().reverse(); 
            stages.forEach((part, idx) => {
                let realIndex = rocketParts.length - 1 - idx;
                let div = document.createElement('div'); div.className = `stage-item`; div.id = `stage-ui-${realIndex}`;
                div.innerHTML = `<span>[Stage ${idx + 1}] ${part.name}</span>`;
                list.appendChild(div);
            });
            currentStageIndex = rocketParts.length - 1;
            highlightCurrentStage();
        }

        function highlightCurrentStage() {
            document.querySelectorAll('.stage-item').forEach(el => el.classList.remove('stage-active'));
            if(document.getElementById(`stage-ui-${currentStageIndex}`)) document.getElementById(`stage-ui-${currentStageIndex}`).classList.add('stage-active');
        }

        function launch() {
            mode = 'flight';
            document.getElementById('build-ui').style.display = 'none';
            document.getElementById('flight-ui').style.display = 'flex';
            document.getElementById('controls-help').style.display = 'block';
            currentFuel = totalFuel;
            initPhysics();
        }

        function initPhysics() {
            // Increase iterations to stop the wobble
            engine = Engine.create({ positionIterations: 16, velocityIterations: 16 });
            engine.gravity.scale = 0; // Turn off flat-earth gravity!

            render = Render.create({
                element: document.body, engine: engine,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#050814' }
            });

            // Create Globe
            planetBody = Bodies.circle(PLANET_POS.x, PLANET_POS.y, PLANET_RADIUS, { 
                isStatic: true, friction: 1, 
                render: { fillStyle: '#1a3627', strokeStyle: '#2a5c41', lineWidth: 5 } 
            });
            Composite.add(engine.world, planetBody);

            // Spawn rocket right above the north pole of the planet
            let startY = PLANET_POS.y - PLANET_RADIUS - 20;
            let currentY = startY;

            for (let i = rocketParts.length - 1; i >= 0; i--) {
                const part = rocketParts[i];
                let body = Bodies.rectangle(0, currentY - (part.height / 2), part.width, part.height, {
                    mass: part.mass, frictionAir: 0.05, render: { fillStyle: part.color }
                });
                body.partData = part; body.partIndex = i;
                physicalBodies[i] = body;
                Composite.add(engine.world, body);
                currentY -= part.height;
            }

            // Stiff Constraints (Anti-Wobble)
            for (let i = 0; i < rocketParts.length - 1; i++) {
                let top = physicalBodies[i]; let bottom = physicalBodies[i+1];
                let width = Math.min(top.bounds.max.x - top.bounds.min.x, bottom.bounds.max.x - bottom.bounds.min.x) / 2 - 2;

                let cLeft = Constraint.create({ bodyA: top, bodyB: bottom, pointA: { x: -width, y: top.bounds.max.y - top.position.y }, pointB: { x: -width, y: bottom.bounds.min.y - bottom.position.y }, stiffness: 1, length: 0, render: { visible: false } });
                let cRight = Constraint.create({ bodyA: top, bodyB: bottom, pointA: { x: width, y: top.bounds.max.y - top.position.y }, pointB: { x: width, y: bottom.bounds.min.y - bottom.position.y }, stiffness: 1, length: 0, render: { visible: false } });
                
                cLeft.jointIndex = i; cRight.jointIndex = i;
                constraints.push(cLeft, cRight);
                Composite.add(engine.world, [cLeft, cRight]);
            }

            updateActiveEngine();
            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            Events.on(engine, 'beforeUpdate', gameLoop);
            Events.on(render, 'afterRender', customRender);
        }

        function updateActiveEngine() {
            activeEngineIndex = -1;
            for (let i = physicalBodies.length - 1; i >= 0; i--) {
                if (physicalBodies[i] && physicalBodies[i].partData.type === 'engine') { activeEngineIndex = i; break; }
            }
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && mode === 'flight') stageRocket();
            if (e.code === 'KeyM' && mode === 'flight') toggleMap();
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        function toggleMap() {
            isMapView = !isMapView;
            let btn = document.getElementById('map-toggle');
            btn.innerText = isMapView ? "[M] MAP VIEW: ON" : "[M] MAP VIEW: OFF";
            btn.style.background = isMapView ? "#22c55e" : "#eab308";
        }

        function stageRocket() {
            if (currentStageIndex < 0) return;
            let partBody = physicalBodies[currentStageIndex];
            if (!partBody) { currentStageIndex--; return; }

            let uiEl = document.getElementById(`stage-ui-${currentStageIndex}`);
            if(uiEl) uiEl.style.opacity = '0.3';

            if (partBody.partData.type === 'parachute') {
                Body.set(partBody, 'frictionAir', 0.8); // Huge drag
                partBody.render.fillStyle = '#ffffff'; 
            } else if (partBody.partData.type === 'decoupler') {
                let jointToBreak = currentStageIndex - 1;
                let cToRemove = constraints.filter(c => c.jointIndex === jointToBreak);
                cToRemove.forEach(c => Composite.remove(engine.world, c));
                
                // Separation force
                if(physicalBodies[currentStageIndex]) Body.applyForce(physicalBodies[currentStageIndex], physicalBodies[currentStageIndex].position, {x: 0, y: 0.01});
                if(physicalBodies[currentStageIndex-1]) Body.applyForce(physicalBodies[currentStageIndex-1], physicalBodies[currentStageIndex-1].position, {x: 0, y: -0.01});
            }

            if (partBody.partData.type === 'decoupler' || partBody.partData.type === 'tank') {
                 for(let i = currentStageIndex; i < physicalBodies.length; i++) physicalBodies[i] = null; 
            }
            currentStageIndex--; updateActiveEngine(); highlightCurrentStage();
        }

        function gameLoop() {
            if (mode !== 'flight') return;
            let pod = physicalBodies[0] || physicalBodies[1]; 
            if (!pod) return;

            // 1. Radial Orbital Gravity
            physicalBodies.forEach(body => {
                if(!body) return;
                
                // Vector from body to planet center
                let dir = Vector.sub(PLANET_POS, body.position);
                let distSq = (dir.x * dir.x) + (dir.y * dir.y);
                let dist = Math.sqrt(distSq);
                
                // Inverse Square Law: F = G * m1 * m2 / r^2
                if (dist > PLANET_RADIUS) {
                    let forceMag = (GRAVITY_CONSTANT * body.mass) / distSq;
                    let force = Vector.mult(Vector.normalise(dir), forceMag);
                    Body.applyForce(body, body.position, force);
                }

                // Dynamic Atmosphere Friction (Decays to 0 in space)
                let altitude = dist - PLANET_RADIUS;
                let atmoDensity = Math.max(0, 1 - (altitude / ATMOSPHERE_HEIGHT));
                if(body.partData.type !== 'parachute') {
                    Body.set(body, 'frictionAir', 0.02 * atmoDensity);
                }
            });

            // 2. Thrust Control
            if ((keys['KeyW'] || keys['ArrowUp']) && currentFuel > 0 && activeEngineIndex !== -1) {
                let engine = physicalBodies[activeEngineIndex];
                if (engine) {
                    let force = { x: engine.partData.thrust * Math.sin(engine.angle), y: -engine.partData.thrust * Math.cos(engine.angle) };
                    Body.applyForce(engine, engine.position, force);
                    currentFuel -= 0.5; // Drains slower now
                }
            }

            // 3. Steering Control
            let steerBody = physicalBodies.find(b => b && b.partData.type === 'pod');
            if (steerBody) {
                if (keys['KeyA'] || keys['ArrowLeft']) Body.setAngularVelocity(steerBody, steerBody.angularVelocity - 0.002);
                if (keys['KeyD'] || keys['ArrowRight']) Body.setAngularVelocity(steerBody, steerBody.angularVelocity + 0.002);
            }

            // 4. Telemetry
            let currentDist = Vector.magnitude(Vector.sub(PLANET_POS, pod.position));
            let altitudeRaw = currentDist - PLANET_RADIUS;
            let speedRaw = Vector.magnitude(pod.velocity) * 5;

            document.getElementById('tel-alt').innerText = (altitudeRaw / 100).toFixed(2) + ' km';
            document.getElementById('tel-spd').innerText = Math.floor(speedRaw) + ' m/s';
            document.getElementById('tel-fuel').innerText = (totalFuel > 0 ? Math.max(0, Math.floor((currentFuel / totalFuel) * 100)) : 0) + '%';

            // 5. Track Trajectory
            tickCounter++;
            if(tickCounter % 10 === 0) {
                trajectory.push({x: pod.position.x, y: pod.position.y});
                if(trajectory.length > 500) trajectory.shift(); // Limit trail length
            }

            // 6. Camera System
            if(isMapView) {
                // Map View: Show whole planet and track ship
                let zoomOut = PLANET_RADIUS * 1.5;
                Render.lookAt(render, {
                    min: { x: PLANET_POS.x - zoomOut, y: PLANET_POS.y - zoomOut },
                    max: { x: PLANET_POS.x + zoomOut, y: PLANET_POS.y + zoomOut }
                });
            } else {
                // Action View: Smooth altitude zoom
                let targetZoom = 1 + (Math.max(0, altitudeRaw) * 0.0005);
                targetZoom = Math.min(targetZoom, 2.0); // Cap zoom
                Render.lookAt(render, {
                    min: { x: pod.position.x - (window.innerWidth/2) * targetZoom, y: pod.position.y - (window.innerHeight/2) * targetZoom },
                    max: { x: pod.position.x + (window.innerWidth/2) * targetZoom, y: pod.position.y + (window.innerHeight/2) * targetZoom }
                });
            }
        }

        function customRender() {
            if (mode !== 'flight') return;
            const ctx = render.context;
            
            // Draw Trajectory Trail
            if (trajectory.length > 1) {
                ctx.beginPath();
                ctx.moveTo(trajectory[0].x, trajectory[0].y);
                for(let i = 1; i < trajectory.length; i++) { ctx.lineTo(trajectory[i].x, trajectory[i].y); }
                ctx.strokeStyle = 'rgba(255, 50, 50, 0.6)';
                ctx.lineWidth = isMapView ? 20 : 3; // Thicker in map view so it's visible
                ctx.stroke();
            }

            // Draw Exhaust
            if ((keys['KeyW'] || keys['ArrowUp']) && currentFuel > 0 && activeEngineIndex !== -1 && !isMapView) {
                let engineBody = physicalBodies[activeEngineIndex];
                if(engineBody) {
                    let exX = engineBody.position.x - Math.sin(engineBody.angle) * (engineBody.partData.height/2 + 5);
                    let exY = engineBody.position.y + Math.cos(engineBody.angle) * (engineBody.partData.height/2 + 5);
                    ctx.fillStyle = Math.random() > 0.5 ? '#ffaa00' : '#ff4400';
                    ctx.beginPath();
                    ctx.arc(exX, exY, 6 + Math.random()*4, 0, 2*Math.PI);
                    ctx.fill();
                }
            }
        }
    </script>
</body>
</html>
